<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <main class="signup-page">
        <form class="signup-card" action="#" method="post" autocomplete="on">
            <h1 class="signup-title">Sign Up</h1>

            <label class="signup-field" for="username">
                <span>Username</span>
                <input id="username" name="username" type="text" required>
            </label>

            <label class="signup-field" for="password">
                <span>Password</span>
                <input id="password" name="password" type="password" required>
            </label>

            <label class="signup-field" for="confirm-password">
                <span>Confirm Password</span>
                <input id="confirm-password" name="confirm-password" type="password" required>
            </label>

            <label class="signup-field" for="email">
                <span>Email</span>
                <input id="email" name="email" type="email" required>
            </label>

            <button class="signup-confirm" type="submit">Confirm</button>
        </form>
    </main>
    <script src="assets/morse-everywhere.js"></script>
</body>
</html>
