<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
    <main class="signup-page">
        <form class="signup-card" action="#" method="post" autocomplete="on">
            <h1 class="signup-title">Sign Up</h1>

            <label class="signup-field" for="username">
                <span>Username</span>
                <input id="username" name="username" type="text" required>
            </label>

            <label class="signup-field" for="password">
                <span>Password</span>
                <input id="password" name="password" type="password" required>
            </label>

            <label class="signup-field" for="confirm-password">
                <span>Confirm Password</span>
                <input id="confirm-password" name="confirm-password" type="password" required>
            </label>

            <label class="signup-field" for="email">
                <span>Email</span>
                <input id="email" name="email" type="email" required>
            </label>

            <button class="signup-confirm" type="button" data-confirm-trigger="true">Confirm</button>
        </form>
    </main>
    <script>
        const signupForm = document.querySelector('.signup-card');

        signupForm.addEventListener('submit', (e) => {
            e.preventDefault();

            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const email = document.getElementById('email').value.trim();

            if (password !== confirmPassword) {
                alert('Passwords do not match.');
                return;
            }

            const userData = { username, password, email };
            localStorage.setItem('signupUser', JSON.stringify(userData));

            alert('User created successfully. Redirecting to login page.');
            window.location.href = 'login.html';
        });
    </script>

    <div class="confirm-modal is-hidden" id="confirm-modal" data-confirm-control="true" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
        <div class="confirm-panel" data-confirm-control="true">
            <p class="confirm-title" id="confirm-title">Are you sure?</p>
            <div class="confirm-actions" id="confirm-actions" data-confirm-control="true">
                <button type="button" class="confirm-choice" data-confirm-option="yes" data-confirm-control="true">Yes</button>
                <button type="button" class="confirm-choice" data-confirm-option="no" data-confirm-control="true">No</button>
            </div>
        </div>
    </div>

    <script src="assets/palette-chaos.js"></script>
    <script src="assets/morse-everywhere.js"></script>
</body>
</html>
