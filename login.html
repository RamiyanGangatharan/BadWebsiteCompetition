    <script>
        const loginForm = document.querySelector('.login-card');

        let loginClickCount = 0;

        function moveButtonRandomly(button) {
            const margin = 20;
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const rect = button.getBoundingClientRect();
            const maxX = Math.max(margin, viewportWidth - rect.width - margin);
            const maxY = Math.max(margin, viewportHeight - rect.height - margin);

            const left = Math.floor(Math.random() * maxX);
            const top = Math.floor(Math.random() * maxY);

            button.style.position = 'fixed';
            button.style.left = `${left}px`;
            button.style.top = `${top}px`;
        }

        loginButton.addEventListener('click', (e) => {
            if (loginClickCount < 4) {
                e.preventDefault();
                loginClickCount += 1;
                moveButtonRandomly(loginButton);
            } else {
                // fifth click allows normal form submission
                loginClickCount += 1;
            }
        });
